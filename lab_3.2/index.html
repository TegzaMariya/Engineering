<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моделювання задачі «Рюкзак»</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="card">
        <h1>Лабораторна робота № 3.2</h1>

        <div class="input-section">
            <div class="input-group">
                <label>Місткість (W)</label>
                <input type="number" id="capacity" value="16">
            </div>
            <div class="input-group">
                <label>Ваги (w)</label>
                <input type="text" id="weights" value="2, 7, 9, 7">
            </div>
            <div class="input-group">
                <label>Цінності (v)</label>
                <input type="text" id="values" value="10, 4, 11, 9">
            </div>
            <button onclick="startSimulation()">Запустити моделювання</button>
        </div>

        <div id="results"></div>
    </div>

    <script src="script.js"></script>
</body>

</html>
