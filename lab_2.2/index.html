<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <title>Моделювання руху тіла</title>

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

    <div class="container">
        <h2>Моделювання руху тіла</h2>

        <div class="inputs">
            <div class="input-group">
                <label>Початкова швидкість v₀ (м/с)</label>
                <input type="number" id="v0" value="20">
            </div>

            <div class="input-group">
                <label>Кут кидання α (°)</label>
                <input type="number" id="angle" value="45">
            </div>

            <div class="input-group">
                <label>Прискорення g (м/с²)</label>
                <input type="number" id="g" value="9.81">
            </div>

            <button onclick="startSimulation()">Старт</button>
        </div>

        <div id="results" class="results"></div>

        <canvas id="chart"></canvas>
    </div>

    <script src="script.js"></script>
</body>

</html>
